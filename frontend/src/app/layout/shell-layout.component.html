<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">AF</span>
      <div>
        <p>Arky Finances</p>
        <small>Local-first monthly planning</small>
      </div>
    </div>

    <section class="user-switcher">
      <div class="user-switcher-head">
        <div>
          <p class="sidebar-kicker">Active person</p>
          <strong>{{ activeUser?.name ?? 'Loading...' }}</strong>
        </div>
        <button type="button" class="ghost-button compact-button" (click)="toggleAddUser()">
          {{ isAddingUser ? 'Close' : 'Add person' }}
        </button>
      </div>

      <label class="field compact-field">
        <span>Workspace selector</span>
        <select [value]="activeUserId ?? ''" (change)="switchUser($event)">
          @for (user of users; track user.id) {
            <option [value]="user.id">{{ user.name }}</option>
          }
        </select>
        <small>{{ activeUser?.timezone ?? 'A separate local workspace for each person using the app.' }}</small>
      </label>

      @if (isAddingUser) {
        <form class="stack add-user-form" [formGroup]="userForm" (ngSubmit)="createUser()">
          <label class="field compact-field">
            <span>Name</span>
            <input type="text" formControlName="name" placeholder="Example: Laura or Kenji" />
          </label>

          <label class="field compact-field">
            <span>Quick region preset</span>
            <select #regionPreset (change)="applyRegionPreset(regionPreset.value)">
              <option value="">Choose a preset</option>
              <option value="argentina">Argentina</option>
              <option value="japan">Japan</option>
            </select>
          </label>

          <label class="field compact-field">
            <span>Locale</span>
            <input type="text" formControlName="locale" />
          </label>

          <label class="field compact-field">
            <span>Timezone</span>
            <input type="text" formControlName="timezone" />
          </label>

          <div class="button-row">
            <button type="submit" class="primary-button" [disabled]="userForm.invalid">Create user</button>
          </div>
        </form>
      }

      @if (userErrorMessage) {
        <p class="user-error">{{ userErrorMessage }}</p>
      }
    </section>

    <nav class="nav">
      @for (item of navigation; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-link"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
